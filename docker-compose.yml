services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    env_file:
      - .env
    networks:
      - grilnica_network

  app:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
    env_file:
      - .env
    volumes:
      - ./app:/app/app
      - ./app/frontend/src:/app/app/frontend/src 
      - ./app/frontend/templates:/app/app/frontend/templates
    networks:
      - grilnica_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  migrations:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
    env_file:
      - .env
    networks:
      - grilnica_network
    command: python -m alembic upgrade head

volumes:
  postgres_data:

networks:
  grilnica_network:
    driver: bridge