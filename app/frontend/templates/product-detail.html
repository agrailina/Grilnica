{% extends "base.html" %}

{% block title %}Грильница • Загрузка...{% endblock %}

{% block extra_css %}
<style>
    .product-detail-section {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px clamp(16px, calc((100vw - 320px) * 0.054 + 16px), 64px) 48px;
    }

    .product-detail-container {
      display: flex;
      gap: clamp(24px, 5vw, 64px);
      align-items: flex-start;
      justify-content: center;
    }

    .product-image-wrapper {
      flex: 0 0 auto;
      width: clamp(250px, 35vw, 380px);
      border-radius: 28px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.05);
      border: 1px solid #f3f4f6;
    }

    .product-detail-image {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: contain;
      display: block;
      background: #fff;
    }

    .product-info {
      flex: 1;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .back-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .back-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: transparent;
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.25s ease;
      color: #697384;
      flex-shrink: 0;
      text-decoration: none;
    }

    .back-button:hover {
      background: rgba(241, 90, 36, 0.08);
      border-color: #f15a24;
      color: #f15a24;
    }

    .back-button svg {
      width: 24px;
      height: 24px;
    }

    .back-label {
      font-size: 16px;
      font-weight: 600;
      color: #697384;
      transition: color 0.25s ease;
      text-decoration: none;
    }

    .back-row:hover .back-label {
      color: #f15a24;
    }

    .product-detail-name {
      font-family: 'Gilroy', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: #1f2937;
      line-height: 1.3;
      letter-spacing: -0.3px;
      margin: 0;
    }

    .product-detail-description {
      font-size: 14px;
      color: #697384;
      line-height: 1.6;
    }

    .product-combo-label {
      font-size: 16px;
      font-weight: 700;
      color: #1f2937;
    }

    .combo-card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.06);
      border: 1px solid #f3f4f6;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      max-width: 350px;
    }

    .combo-mini-image {
      width: 56px;
      height: 56px;
      border-radius: 12px;
      object-fit: contain;
      flex-shrink: 0;
      background: #fff;
    }

    .combo-card-info {
      flex: 1;
    }

    .combo-card-name {
      font-weight: 600;
      font-size: 16px;
      color: #1f2937;
      margin-bottom: 2px;
    }

    .combo-card-price {
      font-weight: 700;
      font-size: 16px;
      color: #1f2937;
    }

    .divider-line {
      width: 100%;
      height: 1px;
      background: #e5e7eb;
      margin: 4px 0;
    }

    .quantity-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .quantity-control {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .quantity-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid #e5e7eb;
      background: #fff;
      font-size: 20px;
      font-weight: 600;
      color: #374151;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Gilroy', sans-serif;
      line-height: 1;
    }

    .quantity-btn:hover {
      border-color: #f15a24;
      color: #f15a24;
      background: rgba(241, 90, 36, 0.05);
    }

    .quantity-value {
      font-size: 20px;
      font-weight: 700;
      color: #1f2937;
      min-width: 30px;
      text-align: center;
    }

    .add-to-cart-price-btn {
      background: #f15a24;
      border: none;
      border-radius: 9999px;
      padding: 14px 28px;
      color: white;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
      font-family: 'Gilroy', sans-serif;
      letter-spacing: 0.2px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .add-to-cart-price-btn:hover {
      background: #d94d1a;
    }

    .loading-state {
      text-align: center;
      padding: 80px 20px;
      color: #697384;
      font-size: 18px;
    }

    .error-state {
      text-align: center;
      padding: 80px 20px;
      color: #ef4444;
    }

    .error-state h3 {
      font-size: 24px;
      margin-bottom: 12px;
    }

    .error-state a {
      color: #f15a24;
      text-decoration: none;
      font-weight: 600;
    }

    @media (max-width: 860px) {
      .product-detail-container {
        flex-direction: column;
        align-items: center;
      }
      .product-image-wrapper {
        width: 100%;
        max-width: 400px;
      }
      .product-info {
        max-width: 100%;
        width: 100%;
      }
    }

    @media (max-width: 640px) {
      .product-detail-section {
        padding: 20px clamp(12px, 4vw, 32px) 40px;
      }
      .product-detail-name {
        font-size: 24px;
      }
      .combo-card {
        max-width: 100%;
      }
    }
</style>
{% endblock %}

{% block content %}
<section class="product-detail-section">
  <div class="product-detail-container" id="productContainer">
    <div class="loading-state">Загрузка...</div>
  </div>
</section>
{% endblock %}

{% block extra_scripts %}
<script>
  (async function() {
    const container = document.getElementById('productContainer');
    
    // Получаем slug или id из URL
    const path = window.location.pathname;
    const parts = path.split('/').filter(p => p);
    const lastPart = parts[parts.length - 1];
    
    // Определяем тип параметра: UUID или slug
    const isUuid = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(lastPart);
    
    // Выбираем правильный API
    const apiUrl = isUuid 
      ? `/api/v1/products/${lastPart}`
      : `/api/v1/product-by-slug/${lastPart}`;

    try {
      const response = await fetch(apiUrl);
      
      if (!response.ok) {
        throw new Error('Товар не найден');
      }

      const product = await response.json();
      
      // Обновляем заголовок страницы
      document.title = `Грильница • ${product.name}`;
      
      // Данные товара
      const categoryName = product.category?.name || 'Комбо';
      const categorySlug = product.category?.slug || 'combo';
      const price = Math.round(parseFloat(product.price));
      const image = product.image || '/static/placeholder.png';
      const name = product.name || 'Без названия';
      const description = product.description || '';

      // Рендерим страницу с реальными данными
      container.innerHTML = `
        <div class="product-image-wrapper">
          <img src="${image}" 
              alt="${name}" 
              class="product-detail-image" 
              onerror="this.src='/static/placeholder.png'">
        </div>

        <div class="product-info">
          <div class="back-row">
            <a href="/menu/${categorySlug}" class="back-button" aria-label="Назад">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
              </svg>
            </a>
            <a href="/menu/${categorySlug}" class="back-label">${categoryName}</a>
          </div>

          <h1 class="product-detail-name">${name}</h1>
          <p class="product-detail-description">${description}</p>
          <p class="product-combo-label">Комбо "${name}"</p>

          <div class="combo-card">
            <img src="${image}" 
                alt="${name}" 
                class="combo-mini-image" 
                onerror="this.style.background='#f9fafb'">
            <div class="combo-card-info">
              <div class="combo-card-name">${name}</div>
              <div class="combo-card-price">${price} ₽</div>
            </div>
          </div>

          <div class="divider-line"></div>

          <div class="quantity-row">
            <div class="quantity-control">
              <button class="quantity-btn" id="decrementBtn">−</button>
              <span class="quantity-value" id="quantityValue">1</span>
              <button class="quantity-btn" id="incrementBtn">+</button>
            </div>
            <button class="add-to-cart-price-btn" id="addToCartBtn">
              <span id="btnPrice">${price} ₽</span>
            </button>
          </div>
        </div>
      `;

      // Логика количества
      let quantity = 1;
      const basePrice = parseFloat(product.price);

      function updatePrice() {
        document.getElementById('quantityValue').textContent = quantity;
        document.getElementById('btnPrice').textContent = Math.round(basePrice * quantity) + ' ₽';
      }

      document.getElementById('decrementBtn').addEventListener('click', () => {
        if (quantity > 1) { quantity--; updatePrice(); }
      });

      document.getElementById('incrementBtn').addEventListener('click', () => {
        if (quantity < 99) { quantity++; updatePrice(); }
      });

      document.getElementById('addToCartBtn').addEventListener('click', () => {
        const total = Math.round(basePrice * quantity);
        alert(`${name} (${quantity} шт.) добавлен в корзину за ${total} ₽`);
        
        if (typeof openCartPanel === 'function') {
          openCartPanel();
        }
      });

      // Активируем категорию в навигации
      if (typeof window.setActiveCategory === 'function') {
        window.setActiveCategory(categorySlug);
      }

    } catch (error) {
      console.error('Ошибка:', error);
      container.innerHTML = `
        <div class="error-state">
          <h3>${error.message}</h3>
          <p>Товар не найден или произошла ошибка загрузки</p>
          <a href="/menu/combo">← Вернуться в Комбо</a>
        </div>`;
    }
  })();
</script>
{% endblock %}
